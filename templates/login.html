{% extends "base.html" %}

{% block title %}
Login - Hidden Gems
{% endblock %}

{% block content %}

<div class="container">

    <div class="form-card">

        <h1>Welcome Back </h1>
        <p class="subtitle">
            Sign in to discover and share hidden travel gems.
        </p>

        <form method="POST" class="form">

            <input
                class="form-input"
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                class="form-input"
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button class="btn btn-primary" type="submit">
                Login
            </button>

        </form>

        <p class="switch-page">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">
                Register
            </a>
        </p>

    </div>

</div>

{% endblock %}
