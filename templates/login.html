{% extends "base.html" %}

{% block title %}
Login - Hidden Gems
{% endblock %}

{% block content %}

<div class="container">

    <!-- Login Form -->
    <div class="form-card">

        <h1>Welcome Back</h1>

        <p class="subtitle">
            Sign in to discover and share hidden travel gems.
        </p>
            {% if error %}
            <p class="error-message">
                {{ error }}
            </p>
            {% endif %}
        <form method="POST" class="form">

            <!-- Username -->
            <input class="form-input" type="text" name="username" placeholder="Username" required>

            <!-- Password -->
            <input class="form-input" type="password" name="password" placeholder="Password" required>

            <!-- Login Button -->
            <button class="btn btn-primary" type="submit">
                Login
            </button>

        </form>

        <!-- Register Link -->
        <p class="switch-page">
            Don't have an account?

            <a href="{{ url_for('auth.register') }}">
                Register
            </a>
        </p>

    </div>

</div>

{% endblock %}
