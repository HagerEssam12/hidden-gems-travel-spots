{% extends "base.html" %}

{% block title %}
Add Spot - Hidden Gems
{% endblock %}

{% block content %}

<div class="container">

    <div class="form-card">

        <h1>Add a Hidden Gem </h1>

        <p class="subtitle">
            Share your favorite travel destination with other explorers.
        </p>

        <form method="POST" class="form">

            <input
                class="form-input"
                type="text"
                name="name"
                placeholder="Spot Name"
                required
            >

            <textarea
                class="form-input"
                name="description"
                placeholder="Description"
                rows="4"
                required
            ></textarea>

            <input
                class="form-input"
                type="text"
                name="location"
                placeholder="Location"
                required
            >

            <select
                class="form-input"
                name="category"
                required
            >
                <option value="">Select Category</option>
                <option value="Nature">Nature</option>
                <option value="Beach">Beach</option>
                <option value="Historical">Historical</option>
                <option value="Adventure">Adventure</option>
            </select>

            <input
                class="form-input"
                type="url"
                name="image_url"
                placeholder="Image URL"
                required
            >

            <button class="btn btn-primary" type="submit">
                Add Spot
            </button>

        </form>

        <a class="btn btn-secondary" href="{{ url_for('spots.home') }}">
            Back to Home
        </a>

    </div>

</div>

{% endblock %}
