{% extends "base.html" %}

{% block title %}
Add Spot - Hidden Gems
{% endblock %}

{% block content %}

<div class="container">

    <div class="form-card">

        <h1>Add a New Hidden Gem</h1>

        <p class="subtitle">
            Share your favorite travel destination with other explorers.
        </p>

        <form method="POST" class="form">

            <!-- Spot Name -->
            <input
                class="form-input"
                type="text"
                name="name"
                placeholder="Spot Name"
                required
            >

            <!-- Description -->
            <textarea
                class="form-input"
                name="description"
                placeholder="Description"
                rows="4"
                required
            ></textarea>

            <!-- Location -->
            <input
                class="form-input"
                type="text"
                name="location"
                placeholder="Location"
                required
            >

            <!-- Category -->
            <select
                class="form-input"
                name="category"
                required
            >
                <option value="">Select Category</option>
                <option value="Nature">Nature</option>
                <option value="Beach">Beach</option>
                <option value="Historical">Historical</option>
                <option value="Adventure">Adventure</option>
            </select>

            <!-- Image URL -->
            <input
                class="form-input"
                type="url"
                name="image_url"
                placeholder="Image URL"
                required
            >

            <!-- Submit Button -->
            <button class="btn btn-primary" type="submit">
                Add Spot
            </button>

        </form>

    </div>

</div>

{% endblock %}
