<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Gems</title>
</head>
<body>

    <h1>Hidden Gems</h1>

    <p>Welcome, {{ session["username"] }}</p>

    <a href="{{ url_for('spots.add_new_spot') }}">Add New Spot</a>
    <a href="{{ url_for('auth.logout') }}">Logout</a>

    <!-- Display all travel spots -->
    {% for spot in spots %}
        <div>
            <img src="{{ spot.image_url }}" alt="{{ spot.name }}" width="300">

            <h2>{{ spot.name }}</h2>

            <p>{{ spot.description }}</p>
            <p>Location: {{ spot.location }}</p>
            <p>Category: {{ spot.category }}</p>
            <p>Added by: {{ spot.added_by }}</p>
        </div>
    {% else %}
        <p>No hidden gems added yet.</p>
    {% endfor %}

</body>
</html>
